services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "7702:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  prod:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "2077:3000"
    environment:
      - NODE_ENV=production
